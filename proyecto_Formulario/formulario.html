<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="estilos/Madrid.css">
   
</head>
<body>
    <h1>Formulario para crear usuario</h1>
    <p>Crear usuario web para ser usuario web de amigos del museo</p>
    
    <form id="formUsuario" action="" method="">
    <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" required><br>

        <label for="apellido1">Primer pellido:</label>
        <input type="text" id="apellido1" required><br>

        <label for="apellido2">Segundo apellido:</label>
        <input type="text" id="apellido2"><br>
        <label for="FechaNacimiento">fecha de nacimiento</label>
        <input type="date" id="FechaNacimiento"><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>
        <label for="password1">contraseña:</label>
        <input type="password" id="password1"><br>
        <label for="password2">Repetir contraseña:</label>
        <input type="password" id="password2"><br>
        <button type="submit" id="Crear">Crear usuario</button>
    </form> 
    <script src="js/app.js"></script>
</body>
</html>
